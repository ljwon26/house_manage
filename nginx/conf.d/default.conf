server {
    listen 80;
    server_name mystrawberry.cloud www.mystrawberry.cloud;

    # 1. 인증서 발급을 위한 설정 (Certbot이 이용)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 2. 나머지 모든 요청은 HTTPS로 강제 이동
    location / {
        return 301 https://$host$request_uri;
    }
}

