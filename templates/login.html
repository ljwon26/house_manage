{% block content %}
<style>
  /* 하이엔드 금융/자산관리 시스템 테마 */
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

  body {
    margin: 0;
    /* 고급스러운 플래티넘 화이트-블루 배경 */
    background-color: #f8fafc;
    background-image: radial-gradient(circle at 50% 0%, #ffffff 0%, #f1f5f9 100%);
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 80px);
  }

  .login-wrapper {
    width: 100%;
    max-width: 440px;
    padding: 2rem;
    box-sizing: border-box;
  }

  /* =========================================
     [신규] 하이엔드 시스템 브랜드 로고 & 심볼
     ========================================= */
  .brand-header {
    text-align: center;
    margin-bottom: 2.5rem;
    user-select: none;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* SVG 기하학 심볼 (신뢰, 자산, 연결을 상징) */
  .brand-symbol {
    width: 52px;
    height: 52px;
    margin-bottom: 16px;
  }

  .brand-logo-text {
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -0.02em;
    color: #0f172a;
    line-height: 1;
    margin-bottom: 6px;
  }

  .brand-logo-sub {
    font-size: 10px;
    color: #2563eb; /* 딥 블루 포인트 */
    letter-spacing: 0.3em; /* 자간을 넓혀 고급스러움 극대화 */
    text-transform: uppercase;
    font-weight: 800;
  }

  /* =========================================
     로그인 폼 카드 영역
     ========================================= */
  .auth-card {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 20px 40px -10px rgba(15, 23, 42, 0.05), 0 0 20px -5px rgba(15, 23, 42, 0.02);
    border: 1px solid rgba(226, 232, 240, 0.8);
    padding: 3rem 2.5rem;
    position: relative;
    overflow: hidden;
  }

  /* 카드 상단 미세한 블루 포인트 라인 */
  .auth-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #1d4ed8 0%, #3b82f6 100%);
  }

  .auth-title {
    font-size: 1.15rem;
    font-weight: 700;
    color: #0f172a;
    margin: 0 0 0.5rem 0;
    text-align: center;
  }

  .auth-description {
    font-size: 0.85rem;
    color: #64748b;
    margin: 0 0 2rem 0;
    line-height: 1.5;
    text-align: center;
  }

  /* 입력 폼 */
  .form-group {
    margin-bottom: 1.25rem;
  }

  .form-group label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    color: #475569;
    margin-bottom: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .form-group input {
    width: 100%;
    box-sizing: border-box;
    padding: 0.875rem 1rem;
    font-family: inherit;
    font-size: 0.95rem;
    color: #0f172a;
    background-color: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 8px; /* 너무 둥글지 않게 날렵한 느낌 */
    outline: none;
    transition: all 0.2s ease;
  }

  .form-group input:focus {
    background-color: #ffffff;
    border-color: #3b82f6;
    box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
  }

  /* 메인 버튼 */
  .btn-primary {
    width: 100%;
    padding: 1rem;
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 700;
    color: #ffffff;
    background-color: #0f172a; /* 신뢰감 있는 딥 네이비 */
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    margin-top: 1rem;
    letter-spacing: 0.02em;
  }

  .btn-primary:hover {
    background-color: #1e293b;
    box-shadow: 0 4px 12px rgba(15, 23, 42, 0.15);
  }

  /* 기기 등록 버튼 (테두리만 있는 고스트 버튼 스타일) */
  .btn-secondary {
    width: 100%;
    padding: 1rem;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    color: #3b82f6;
    background-color: transparent;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    margin-top: 1rem;
  }

  .btn-secondary:hover {
    background-color: #f1f5f9;
    border-color: #94a3b8;
  }

  /* 알림 박스 */
  .alert {
    padding: 0.875rem 1rem;
    border-radius: 8px;
    font-size: 0.85rem;
    margin-bottom: 1.5rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .alert-error { background-color: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
  .alert-success { background-color: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }

  /* 폼 전환 애니메이션 */
  .form-section { display: none; animation: fadeIn 0.4s ease-out; }
  .form-section.active { display: block; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* 하단 보안 배지 */
  .security-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 2rem;
    font-size: 0.75rem;
    color: #64748b;
    font-weight: 600;
  }
  .security-badge svg {
    width: 14px;
    height: 14px;
    color: #10b981;
  }

  @media (max-width: 480px) {
    .auth-card { padding: 2.5rem 1.5rem; }
    .login-wrapper { padding: 1rem; }
  }
  /* 모바일 최적화 스타일 강화 */
  @media (max-width: 640px) {
    .login-wrapper {
      padding: 1.5rem; /* 여백 축소 */
    }
    
    .auth-card {
      padding: 2.5rem 1.5rem; /* 카드 내부 여백 조정 */
      border-radius: 12px;
      box-shadow: none; /* 모바일에서는 그림자보다 깔끔한 선 강조 */
      border: 1px solid #e2e8f0;
    }

    .brand-logo-text {
      font-size: 28px; /* 로고 크기 조절 */
    }

    .auth-title {
      font-size: 1.25rem;
    }

    /* 모바일에서 버튼 클릭이 쉽도록 높이 유지 */
    .btn-primary, .btn-secondary {
      padding: 1.1rem;
      font-size: 1rem;
    }
    
    /* 입력창 폰트 크기가 16px 미만이면 아이폰에서 자동 줌이 발생하므로 16px 권장 */
    .form-group input {
      font-size: 16px;
      padding: 0.9rem;
    }
</style>

<div class="login-wrapper">
  
  <div class="brand-header">
    <svg class="brand-symbol" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="8" y="16" width="16" height="16" rx="3" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-width="2"/>
      <rect x="16" y="8" width="16" height="16" rx="3" fill="#0f172a"/>
    </svg>
    <div class="brand-logo-text">J&D</div>
    <div class="brand-logo-sub">Asset Management</div>
  </div>

  <div class="auth-card">
    
    {% if error %}
    <div class="alert alert-error">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
      {{ error }}
    </div>
    {% endif %}
    {% if message %}
    <div class="alert alert-success">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
      {{ message }}
    </div>
    {% endif %}

    <div id="loginForm" class="form-section active">
      <h2 class="auth-title">System Login</h2>
      <p class="auth-description">인가된 디바이스에서만 접근이 허용됩니다.</p>

      <form action="/login" method="POST">
        <div class="form-group">
          <label>PASSWORD</label>
          <input type="password" name="password" placeholder="비밀번호를 입력하십시오" required>
        </div>
        <button type="submit" class="btn-primary">보안 접속 (Secure Login)</button>
      </form>
      
      <button type="button" class="btn-secondary" onclick="toggleView('registerForm')">
        새로운 디바이스 인증하기
      </button>
    </div>

    <div id="registerForm" class="form-section">
      <h2 class="auth-title">Device Verification</h2>
      <p class="auth-description">자산 보호를 위해 디바이스를 시스템에 등록합니다.</p>

      <form action="/register-device" method="POST">
        <div class="form-group">
          <label>DEVICE ALIAS</label>
          <input type="text" name="device_name" placeholder="예: CEO iPhone, Home PC" required>
        </div>
        <div class="form-group">
          <label>MASTER CODE</label>
          <input type="password" name="secret_code" placeholder="최초 인증용 마스터 코드" required>
        </div>
        <button type="submit" class="btn-primary" style="background-color: #1d4ed8;">디바이스 승인 및 등록</button>
      </form>

      <div style="text-align: center; margin-top: 1rem;">
        <span onclick="toggleView('loginForm')" style="font-size: 0.85rem; color: #64748b; cursor: pointer; text-decoration: underline;">
          ← 로그인 화면으로 복귀
        </span>
      </div>
    </div>

  </div>

  <div class="security-badge">
    <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
    </svg>
    Trusted Device Verification &middot; J&D System
  </div>

</div>

<script>
  function toggleView(targetId) {
    document.querySelectorAll('.form-section').forEach(el => {
      el.classList.remove('active');
    });
    document.getElementById(targetId).classList.add('active');
  }
</script>
{% endblock %}
