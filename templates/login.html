<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자산 관리 시스템</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f8fafc;
            /* 은은한 쿨톤 화이트 & 라이트 블루 배경 */
            background-image: 
                radial-gradient(circle at 10% 0%, #e0eaff 0%, transparent 40%),
                radial-gradient(circle at 90% 100%, #dbeafe 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, #ffffff 0%, transparent 60%);
            position: relative;
            overflow: hidden;
            min-height: 100vh;
        }

        /* 로그인 카드 글래스모피즘 효과 */
        .login-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 
                0 20px 40px -10px rgba(15, 23, 42, 0.05),
                0 0 0 1px rgba(255, 255, 255, 0.6) inset;
        }

        /* 인풋창 포커스 애니메이션 */
        .input-focus-ring:focus-within {
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            border-color: #3b82f6;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <svg class="absolute bottom-0 left-0 w-80 h-80 text-blue-600/5 pointer-events-none" viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M-50,200 L150,0 M-20,200 L180,0 M10,200 L210,0 M40,200 L240,0" />
        <path d="M-50,170 L120,-10 M-20,170 L150,-10" opacity="0.5"/>
    </svg>

    <svg class="absolute top-0 right-0 w-96 h-96 text-blue-600/5 pointer-events-none transform rotate-180" viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="1">
        <path d="M-50,200 L150,0 M-20,200 L180,0 M10,200 L210,0 M40,200 L240,0" />
    </svg>

    <main class="login-card w-full max-w-[420px] p-10 rounded-[2rem] text-center relative z-10">
        
        <header class="mb-10">
            <div class="flex items-center justify-center gap-3 mb-3">
                <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-[#0f172a] to-[#1e3a8a] flex items-center justify-center shadow-lg relative overflow-hidden group">
                    <div class="absolute inset-0 bg-white/20 transform -skew-x-12 translate-x-full group-hover:-translate-x-full transition-transform duration-700 ease-in-out"></div>
                    <span class="text-white text-2xl font-black italic pr-1">J</span>
                </div>
                <span class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-[#0f172a] to-[#1d4ed8] tracking-tighter">
                    J&D
                </span>
            </div>
        </header>

        <h2 class="text-xl font-bold text-slate-800 mb-8">
            환영합니다. 다슬과 재원의 미래
        </h2>

        {% if error %}
        <div class="mb-6 p-3 bg-red-50 text-red-500 text-sm rounded-xl font-medium border border-red-100 flex items-center justify-center gap-2">
            <i class="fa-solid fa-circle-exclamation"></i>
            {{ error }}
        </div>
        {% endif %}

        <form action="/login" method="POST" class="space-y-6">
            
            <div class="relative group input-focus-ring rounded-xl transition-all duration-200 bg-white/60 border border-slate-200">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <i class="fa-solid fa-lock text-slate-400 group-focus-within:text-blue-600 transition-colors"></i>
                </div>
                <input type="password" id="password" name="password" required
                       class="w-full pl-12 pr-4 py-4 bg-transparent focus:outline-none placeholder-slate-400 text-slate-800 font-medium text-lg rounded-xl"
                       placeholder="비밀번호">
            </div>

            <button type="submit"
                    class="w-full py-4 bg-gradient-to-r from-[#1e3a8a] via-[#2563eb] to-[#3b82f6] hover:from-[#0f172a] hover:via-[#1d4ed8] hover:to-[#2563eb] text-white text-lg font-bold rounded-xl shadow-[0_10px_20px_-10px_rgba(37,99,235,0.4)] hover:shadow-[0_15px_25px_-10px_rgba(37,99,235,0.5)] transform hover:-translate-y-0.5 transition-all duration-300">
                로그인
            </button>
        </form>

    </main>
</body>
</html>
