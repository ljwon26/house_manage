<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}J&D System{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico?v=3">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
        .glass-header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #e2e8f0;
        }
    </style>
</head>
<body class="text-slate-800">

    <header class="fixed top-0 left-0 w-full glass-header z-50">
        <div class="container mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                
                <div class="flex-shrink-0 flex items-center gap-4">
                    <a href="/" class="flex items-center gap-3">
                        <img src="/static/logo.png" alt="J&D Logo" class="h-8 w-auto" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
                        <div class="text-2xl font-bold text-slate-800 tracking-tighter">
                            J<span class="text-blue-600">&</span>D
                        </div>
                    </a>
                    
                    <div class="h-5 w-px bg-slate-200"></div>
                    
                    <a href="/dashboard" class="group flex items-center gap-2 text-slate-400 hover:text-blue-600 transition-colors" title="대시보드로 이동">
                        <div class="w-8 h-8 rounded-lg bg-slate-50 border border-slate-100 flex items-center justify-center group-hover:bg-blue-50 transition-colors shadow-sm">
                            <i class="fa-solid fa-house text-sm"></i>
                        </div>
                        <span class="text-sm font-bold hidden sm:block">Home</span>
                    </a>
                </div>

            </div>
        </div>
    </header>

    <main class="pt-24 pb-10 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
